<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  #total-count { font-size: 0.85rem; opacity: 0.6; }

  .controls select { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
  .controls label { font-size: 0.85rem; color: #555; }
  table { width: 100%; border-collapse: collapse; background: #fff; }
  thead th { background: #eef; padding: 10px 16px; text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #555; border-bottom: 2px solid #ddd; }

  tbody tr:hover { background: #f9f9ff; }
  td { padding: 10px 16px; vertical-align: top; font-size: 0.875rem; }
  td.filename { font-family: monospace; font-size: 0.75rem; color: #444; max-width: 220px; word-break: break-all; }
  td.location { font-size: 0.78rem; color: #888; white-space: nowrap; }
  td.title { font-weight: 500; max-width: 200px; }
  td.author { color: #555; font-size: 0.8rem; }
  td.summary { color: #444; max-width: 320px; line-height: 1.4; font-size: 0.82rem; }
  td.year { white-space: nowrap; color: #888; }
  .conf-high { color: #2a7; font-weight: 600; }
  .conf-medium { color: #b80; }
  .conf-low { color: #c44; }
  .pagination { padding: 16px 24px; display: flex; gap: 8px; align-items: center; justify-content: center; background: #fff; border-top: 1px solid #eee; }
  .pagination button { padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 0.85rem; }
  .pagination button:hover:not(:disabled) { background: #eef; }
  .pagination button.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .pg-info { font-size: 0.85rem; color: #666; margin: 0 8px; }
  .no-results { padding: 40px; text-align: center; color: #888; }
  .tag-pills { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .tag { display: inline-block; background: #e8f0fe; color: #1a56db; border-radius: 10px; padding: 1px 7px; font-size: 0.7rem; white-space: nowrap; }
  .folder-stem { color: #1a7f37; font-weight: 600; }
  .folder-social { color: #9a3412; font-weight: 600; }
  .folder-humanities { color: #6d28d9; font-weight: 600; }
  .folder-inbox { color: #6b7280; }
  .status-read { color: #2a7; }
  .status-reading { color: #b80; }
  .status-unread { color: #aaa; }
  .status-reference { color: #1a56db; }
  .controls select[multiple] { height: 80px; min-width: 160px; }
</style>
</head>

  years.forEach(y => { const o = document.createElement('option'); o.value = o.textContent = y; yearSel.appendChild(o); });

  // populate tag filter
  const allTags = [...new Set(allEntries.flatMap(e => e.tags || []))].sort();
  const tagSel = document.getElementById('tag-filter');
  allTags.forEach(t => { const o = document.createElement('option'); o.value = o.textContent = t; tagSel.appendChild(o); });

  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const dir = document.getElementById('dir-filter').value;
  const year = document.getElementById('year-filter').value;
  const conf = document.getElementById('conf-filter').value;
  const folder = document.getElementById('folder-filter').value;
  const status = document.getElementById('status-filter').value;
  const tag = document.getElementById('tag-filter').value;

  filtered = allEntries.filter(e => {
    if (dir && e.source_dir !== dir) return false;
    if (year && String(e.year) !== year) return false;
    if (conf && e.confidence !== conf) return false;
    if (folder && e.folder !== folder) return false;
    if (status && e.status !== status) return false;
    if (tag && !(e.tags || []).includes(tag)) return false;
    if (q) {
      const hay = [e.title, e.author, e.summary, e.new_path, e.original_path, (e.tags||[]).join(' ')].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  currentPage = 1;
  document.getElementById('total-count').textContent = filtered.length + ' of ' + allEntries.length + ' entries';
  render();
}

function render() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('table-body');

  document.getElementById('no-results').style.display = filtered.length === 0 ? '' : 'none';

  tbody.innerHTML = page.map(e => {
    const folderClass = {STEM:'folder-stem',SocialSciences:'folder-social',Humanities:'folder-humanities','_inbox':'folder-inbox'}[e.folder] || '';
    const statusClass = 'status-' + (e.status || 'unread');
    const tagPills = (e.tags || []).map(t => '<span class="tag">' + esc(t) + '</span>').join('');
    const folderLabel = e.folder ? '<span class="' + folderClass + '">' + esc(e.folder) + '</span>' : esc(e.source_dir || '');
    const statusLabel = e.status ? '<br><span class="' + statusClass + '" style="font-size:0.72rem">' + esc(e.status) + '</span>' : '';
    return '<tr>' +
      '<td class="filename">' + esc(e.new_path || e.original_path) + '</td>' +
      '<td class="location">' + folderLabel + statusLabel + '</td>' +
      '<td class="title">' + esc(e.title || '') + '<br><span class="author">' + esc(e.author || '') + '</span></td>' +
      '<td class="year">' + (e.year || '—') + '</td>' +
      '<td class="summary">' + esc(e.summary || '') + '</td>' +
      '<td><div class="tag-pills">' + tagPills + '</div></td>' +
      '<td><span class="conf-' + (e.confidence||'') + '">' + (e.confidence || '') + '</span></td>' +
      '</tr>';
  }).join('');

  renderPagination();
}

function renderPagination() {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  const pages = new Set([1, totalPages, currentPage]);
  for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) pages.add(i);
  const sorted = [...pages].sort((a,b)=>a-b);

  let html = '<button onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>&#8249;</button>';
  let prev = null;
  sorted.forEach(p => {
    if (prev !== null && p - prev > 1) html += '<span class="pg-info">…</span>';
    html += '<button class="' + (p===currentPage?'active':'') + '" onclick="goPage(' + p + ')">' + p + '</button>';
    prev = p;
  });
  html += '<button onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage===totalPages?'disabled':'') + '>&#8250;</button>';
  html += '<span class="pg-info">Page ' + currentPage + ' of ' + totalPages + '</span>';
  el.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  currentPage = p;
  render();
  window.scrollTo(0,0);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
